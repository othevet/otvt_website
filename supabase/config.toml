
[functions.notify-client-message]
enabled = true
verify_jwt = false
import_map = "./functions/notify-client-message/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/notify-client-message/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/notify-client-message/*.html" ]

[functions.log-login-device]
enabled = true
# false (pas true) : appelée depuis le navigateur, la requête préliminaire
# OPTIONS n'a pas d'Authorization — avec true, la plateforme la rejetterait
# avant même d'atteindre le handler OPTIONS. Le JWT est vérifié
# manuellement dans le code via getUser(), tout aussi strict. Voir le
# commentaire en tête de index.ts.
verify_jwt = false
import_map = "./functions/log-login-device/deno.json"
entrypoint = "./functions/log-login-device/index.ts"

[functions.request-account-deletion]
enabled = true
# false, même raison que log-login-device (voir commentaire en tête de
# index.ts).
verify_jwt = false
import_map = "./functions/request-account-deletion/deno.json"
entrypoint = "./functions/request-account-deletion/index.ts"
